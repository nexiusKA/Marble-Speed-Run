<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Marble Rush</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div id="hud-left">
        <div id="hud-dist">Dist: <span id="dist-display">0</span> m</div>
        <div id="hud-void">Void: <span id="void-display">--</span> m</div>
        <div id="hud-timer">Time: <span id="timer-display">0:00.0</span></div>
        <div id="hud-coins">💰 <span id="coin-display">0</span></div>
      </div>
      <div id="hud-best">Best: <span id="best-display">--</span></div>
      <button id="fullscreen-btn" class="hud-fs-btn" title="Enter fullscreen" aria-label="Enter fullscreen">
        <svg id="fs-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="square">
          <polyline points="0,4 0,0 4,0"/>
          <polyline points="10,0 14,0 14,4"/>
          <polyline points="14,10 14,14 10,14"/>
          <polyline points="4,14 0,14 0,10"/>
        </svg>
      </button>
    </div>

    <div id="mobile-controls">
      <button id="btn-left"  class="ctrl-btn" aria-label="Left">◀</button>
      <button id="btn-up"    class="ctrl-btn" aria-label="Up">▲</button>
      <button id="btn-down"  class="ctrl-btn" aria-label="Down">▼</button>
      <button id="btn-right" class="ctrl-btn" aria-label="Right">▶</button>
    </div>

    <div id="overlay" class="overlay visible">
      <div class="overlay-box">
        <h1 class="game-title">MARBLE RUSH</h1>
        <p class="subtitle">Outrun the void. Survive forever.</p>
        <div class="controls-info">
          <span>← → &nbsp;Steer</span>
          <span>↑ &nbsp;Slow</span>
          <span>↓ &nbsp;Boost</span>
          <span>R &nbsp;Restart</span>
        </div>
        <div class="pickup-legend">
          <span class="pl-speed">⚡ Speed</span>
          <span class="pl-dash">▶▶ Dash</span>
          <span class="pl-fog">❄ Bar Slow</span>
          <span class="pl-shield">◆ Shield</span>
          <span class="pl-powerrush">⚡⚡ Power Rush</span>
        </div>
        <div class="sound-controls">
          <button id="sound-toggle" class="sound-btn" title="Toggle sound" aria-label="Toggle sound">🔊</button>
          <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="70" aria-label="Volume">
        </div>
        <div class="steer-controls">
          <div class="steer-label">Steering <span id="steer-value">100</span></div>
          <div class="steer-row">
            <input type="range" id="steer-slider" class="steer-slider" min="1" max="100" value="100" aria-label="Steering sensitivity">
            <button id="steer-default-btn" class="btn-small">Default</button>
          </div>
        </div>
        <div class="steer-controls">
          <div class="steer-label">Fall Speed <span id="fall-value">100</span></div>
          <div class="steer-row">
            <input type="range" id="fall-slider" class="steer-slider" min="1" max="100" value="100" aria-label="Fall speed">
            <button id="fall-default-btn" class="btn-small">Default</button>
          </div>
        </div>
        <div class="steer-controls">
          <div class="steer-label">Void Speed <span id="void-rate-value">100</span>%</div>
          <div class="steer-row">
            <input type="range" id="void-rate-slider" class="steer-slider" min="10" max="200" value="100" aria-label="Void speed">
            <button id="void-rate-default-btn" class="btn-small">Default</button>
          </div>
        </div>
        <div class="difficulty-btns">
          <button id="easy-btn"   class="btn btn-easy">EASY</button>
          <button id="normal-btn" class="btn btn-normal">NORMAL</button>
          <button id="hard-btn"   class="btn btn-hard">HARD</button>
        </div>
        <button id="play-btn" class="btn btn-play">PLAY</button>
        <details class="git-info" id="git-info" open>
          <summary>Build Info</summary>
          <dl class="git-info-grid">
            <dt>Run</dt><dd id="gi-run">dev</dd>
            <dt>Commit</dt><dd id="gi-sha">dev</dd>
            <dt>Branch</dt><dd id="gi-branch">dev</dd>
            <dt>Date</dt><dd id="gi-date">dev</dd>
          </dl>
        </details>
      </div>
    </div>

    <div id="version-tag">v0.2</div>

    <div id="gameover-overlay" class="overlay hidden">
      <div class="overlay-box">
        <h2 class="finish-title">CAUGHT!</h2>
        <p id="go-dist" class="finish-time"></p>
        <div id="go-coin-breakdown" class="coin-breakdown hidden">
          <p id="go-coins" class="finish-coins"></p>
          <p id="go-bonus" class="finish-bonus"></p>
          <p id="go-total" class="finish-total"></p>
        </div>
        <p id="go-best" class="finish-best"></p>
        <button id="retry-btn" class="btn">PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <script src="js/version.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/marble.js"></script>
  <script src="js/obstacle.js"></script>
  <script src="js/track.js"></script>
  <script src="js/fog.js"></script>
  <script src="js/pickup.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
