<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marble Rush</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div id="hud-dist">Dist: <span id="dist-display">0</span> m</div>
      <div id="hud-best">Best: <span id="best-display">--</span></div>
    </div>

    <div id="overlay" class="overlay visible">
      <div class="overlay-box">
        <h1 class="game-title">MARBLE RUSH</h1>
        <p class="subtitle">Outrun the fog. Survive forever.</p>
        <div class="controls-info">
          <span>← → &nbsp;Steer</span>
          <span>R &nbsp;Restart</span>
          <span>` &nbsp;Debug</span>
        </div>
        <div class="pickup-legend">
          <span class="pl-speed">⚡ Speed</span>
          <span class="pl-dash">▶▶ Dash</span>
          <span class="pl-fog">❄ Bar Slow</span>
          <span class="pl-shield">◆ Shield</span>
        </div>
        <button id="start-btn" class="btn">START</button>
      </div>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
      <div class="overlay-box">
        <h2 class="finish-title">CAUGHT!</h2>
        <p id="go-dist" class="finish-time"></p>
        <p id="go-best" class="finish-best"></p>
        <button id="retry-btn" class="btn">PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/marble.js"></script>
  <script src="js/obstacle.js"></script>
  <script src="js/track.js"></script>
  <script src="js/fog.js"></script>
  <script src="js/pickup.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
