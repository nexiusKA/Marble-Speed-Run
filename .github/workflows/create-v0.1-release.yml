name: Create Incremental Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get next version
        id: version
        run: |
          # Get the latest release tag
          LATEST_TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "v0.0")

          # Extract version numbers
          if [[ $LATEST_TAG == v0.* ]]; then
            MINOR=${LATEST_TAG#v0.}
            NEXT_MINOR=$((MINOR + 1))
            NEXT_VERSION="v0.$NEXT_MINOR"
          else
            NEXT_VERSION="v0.1"
          fi

          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          gh release create ${{ steps.version.outputs.next_version }} \
            --title "Marble Speed Run ${{ steps.version.outputs.next_version }}" \
            --notes "## Marble Speed Run ${{ steps.version.outputs.next_version }} - Release

Latest changes pushed to main branch.

### Assets Included
- \`game.html\` - Main game
- \`index.html\` - Homepage
- \`perk-library.html\` - Perks system
- \`showcase.html\` - Game showcase

Commit: ${{ github.sha }}" \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
